<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Confetti Clicker - 点击爆彩纸屑！</title>
  <style>
    :root {
      --bg: #0f0f23;
      --text: #e0e0ff;
      --accent: #ff6bff;
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, sans-serif;
      overflow: hidden;
      cursor: pointer;
      user-select: none;
      touch-action: manipulation;
    }

    canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    .ui {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      pointer-events: none;
    }

    h1 {
      font-size: clamp(3rem, 12vw, 8rem);
      font-weight: 900;
      color: #fff;
      text-shadow: 0 0 40px var(--accent), 0 0 80px #00ffff;
      margin-bottom: 1rem;
      animation: glow 3s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 20px var(--accent), 0 0 40px #00ffff; }
      to   { text-shadow: 0 0 60px var(--accent), 0 0 120px #00ffff; }
    }

    .score {
      font-size: clamp(4rem, 15vw, 12rem);
      font-weight: bold;
      color: #fff;
      text-shadow: 0 0 30px currentColor;
      margin: 1rem 0;
    }

    .subtitle {
      font-size: 1.5rem;
      opacity: 0.8;
      margin-top: 1rem;
    }

    .achieve {
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(10px);
      padding: 1.2rem 2.5rem;
      border-radius: 20px;
      border: 2px solid var(--accent);
      font-size: 1.8rem;
      font-weight: bold;
      color: #fff;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.5s, transform 0.5s;
      z-index: 20;
      white-space: nowrap;
    }

    .achieve.show {
      opacity: 1;
      transform: translateX(-50%) translateY(-20px);
    }

    .hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 1.1rem;
      opacity: 0.7;
      pointer-events: none;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div class="ui">
  <h1>Confetti<br>Clicker</h1>
  <div class="score" id="score">0</div>
  <div class="subtitle">点我！爆彩纸屑！</div>
</div>

<div class="achieve" id="achieve"></div>

<div class="hint">点击 / 轻触 屏幕任意位置</div>

<script>
// ------------------- Canvas Confetti -------------------
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
});

let particles = [];

class Particle {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.size = Math.random() * 8 + 4;
    this.speedX = Math.random() * 6 - 3;
    this.speedY = Math.random() * -12 - 8;
    this.color = `hsl(${Math.random()*360}, 100%, 60%)`;
    this.gravity = 0.15;
    this.friction = 0.98;
    this.alpha = 1;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = Math.random() * 0.1 - 0.05;
  }

  update() {
    this.speedY += this.gravity;
    this.speedX *= this.friction;
    this.speedY *= this.friction;
    this.x += this.speedX;
    this.y += this.speedY;
    this.rotation += this.rotSpeed;
    this.alpha -= 0.008;
  }

  draw() {
    ctx.save();
    ctx.globalAlpha = this.alpha;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    ctx.fillStyle = this.color;
    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
    ctx.restore();
  }
}

function createConfetti(x, y, count = 80) {
  for (let i = 0; i < count; i++) {
    particles.push(new Particle(x, y));
  }
}

function animate() {
  ctx.fillStyle = 'rgba(15,15,35,0.12)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  particles = particles.filter(p => p.alpha > 0.01);
  particles.forEach(p => {
    p.update();
    p.draw();
  });

  requestAnimationFrame(animate);
}

animate();

// ------------------- Click / Touch Logic -------------------
let score = 0;
const scoreEl = document.getElementById('score');
const achieveEl = document.getElementById('achieve');

const achievements = [
  { count: 10,  text: "新手上路！10次啦～🎉" },
  { count: 50,  text: "小有成就！50次！✨" },
  { count: 100, text: "上瘾警告！100次！🔥" },
  { count: 250, text: "你是认真的吗？！250次…😳" },
  { count: 500, text: "彩纸屑之神！500次！🌟" },
  { count: 1000,text: "……你赢了。1000次。👑" }
];

let shown = new Set();

function showAchieve(text) {
  achieveEl.textContent = text;
  achieveEl.classList.add('show');
  setTimeout(() => achieveEl.classList.remove('show'), 3000);
}

function handleClick(e) {
  const x = e.clientX || (e.touches && e.touches[0].clientX);
  const y = e.clientY || (e.touches && e.touches[0].clientY);

  score++;
  scoreEl.textContent = score;

  createConfetti(x, y, 60 + Math.floor(score / 50) * 10); // 越多越爽

  // 检查成就
  achievements.forEach(a => {
    if (score >= a.count && !shown.has(a.count)) {
      shown.add(a.count);
      showAchieve(a.text);
    }
  });
}

window.addEventListener('click', handleClick);
window.addEventListener('touchstart', handleClick, { passive: true });
</script>

</body>
</html>
