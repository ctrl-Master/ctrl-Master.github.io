<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>今天吃什么？｜纠结终结器</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="container">
    <h1>今天<span>到底</span>吃什么？</h1>
    
    <div class="decision-box" id="result">
      <div class="emoji" id="emoji">🤔</div>
      <p id="food">点击下方按钮，让命运决定！</p>
      <small id="comment"></small>
    </div>

    <button id="decideBtn">帮我决定！</button>
    
    <div class="tips">
      <p>已经点了<span id="count">0</span>次了… 你真的很饿</p>
    </div>
  </div>

  <footer>
    <p>纯静态小玩具 | 可 fork 改成你家附近的美食</p>
  </footer>

  <script src="script.js"></script>
