<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>停车场挪车 - 简化版</title>
  <style>
    body {
      margin: 0;
      height: 100dvh;
      background: #111;
      color: #eee;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
    }
    h1 { margin: 16px; font-size: 1.8rem; color: #4fc3f7; }
    #game {
      position: relative;
      width: 360px;
      height: 540px;
      background: #222;
      border: 4px solid #555;
      border-radius: 12px;
      overflow: hidden;
      touch-action: none;
      user-select: none;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(6, 60px);
      grid-template-rows: repeat(9, 60px);
      gap: 2px;
      padding: 4px;
      background: #333;
    }
    .cell {
      background: #444;
      border-radius: 6px;
    }
    .car {
      position: absolute;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.4rem;
      font-weight: bold;
      color: white;
      cursor: grab;
      user-select: none;
      touch-action: none;
      transition: transform 0.08s;
    }
    .car.horizontal { height: 58px; }
    .car.vertical   { width: 58px;  }
    .car.player { background: #e53935; box-shadow: 0 0 12px #e53935; }
    .car.other  { background: linear-gradient(45deg, #7e57c2, #5c6bc0); }
    #levelInfo { margin: 12px; font-size: 1.2rem; }
    #message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.8);
      padding: 20px 40px;
      border-radius: 16px;
      font-size: 2rem;
      color: #4caf50;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.6s;
      z-index: 10;
    }
    button {
      margin: 16px;
      padding: 12px 32px;
      font-size: 1.2rem;
      background: #4caf50;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover { background: #388e3c; }
  </style>
</head>
<body>

<h1>停车场挪车 · 简化版</h1>
<div id="levelInfo">第 1 关</div>

<div id="game">
  <div id="message">恭喜通关！</div>
</div>

<button id="nextBtn" style="display:none;">下一关</button>

<script>
// ====================== 配置 ======================
const GRID_SIZE = 60;     // 每个格子大小
const COLS = 6;
const ROWS = 9;

let levels = [
  // 关卡数据：{id, color, isPlayer, row, col, length, direction: 'h'/'v'}
  // 玩家车必须是横向的，且出口在右边
  [
    {id:1, color:'#e53935', isPlayer:true,  row:4, col:1, length:2, dir:'h'},  // 玩家红车
    {id:2, color:'#7e57c2', isPlayer:false, row:2, col:2, length:3, dir:'h'},
    {id:3, color:'#7e57c2', isPlayer:false, row:6, col:0, length:4, dir:'h'},
    {id:4, color:'#7e57c2', isPlayer:false, row:1, col:4, length:2, dir:'v'},
  ],
  // 关卡2 （更复杂一点）
  [
    {id:1, color:'#e53935', isPlayer:true,  row:4, col:0, length:2, dir:'h'},
    {id:2, color:'#26a69a', isPlayer:false, row:3, col:2, length:3, dir:'h'},
    {id:3, color:'#ab47bc', isPlayer:false, row:0, col:3, length:3, dir:'v'},
    {id:4, color:'#ffa726', isPlayer:false, row:5, col:1, length:4, dir:'h'},
    {id:5, color:'#ec407a', isPlayer:false, row:7, col:4, length:2, dir:'v'},
  ],
  // 你可以继续加更多关卡...
];

let currentLevel = 0;
let cars = [];
let selectedCar = null;
let offsetX = 0, offsetY = 0;
let gameDiv = document.getElementById('game');
let msg = document.getElementById('message');
let nextBtn = document.getElementById('nextBtn');

// ====================== 初始化关卡 ======================
function initLevel(levelIndex) {
  gameDiv.innerHTML = '';
  cars = [];
  selectedCar = null;
  msg.style.opacity = '0';
  nextBtn.style.display = 'none';

  const level = levels[levelIndex % levels.length];

  level.forEach(carData => {
    const car = document.createElement('div');
    car.classList.add('car');
    car.classList.add(carData.isPlayer ? 'player' : 'other');
    car.textContent = carData.isPlayer ? '🚗' : '🚙';
    car.dataset.id = carData.id;
    car.dataset.length = carData.length;
    car.dataset.dir = carData.dir;

    const w = carData.dir === 'h' ? carData.length * GRID_SIZE : GRID_SIZE;
    const h = carData.dir === 'v' ? carData.length * GRID_SIZE : GRID_SIZE;

    car.style.width  = w + 'px';
    car.style.height = h + 'px';
    car.style.left   = carData.col * GRID_SIZE + 'px';
    car.style.top    = carData.row * GRID_SIZE + 'px';

    gameDiv.appendChild(car);
    cars.push({el:car, ...carData});
  });

  document.getElementById('levelInfo').textContent = `第 ${levelIndex + 1} 关`;
}

// ====================== 拖拽逻辑 ======================
gameDiv.addEventListener('mousedown', startDrag);
gameDiv.addEventListener('touchstart', startDrag, {passive:false});

function startDrag(e) {
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;
  const target = touch.target.closest('.car');
  if (!target) return;

  selectedCar = cars.find(c => c.el === target);
  if (!selectedCar) return;

  const rect = target.getBoundingClientRect();
  offsetX = touch.clientX - rect.left;
  offsetY = touch.clientY - rect.top;

  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('mouseup', endDrag);
  document.addEventListener('touchend', endDrag);
}

function onMove(e) {
  if (!selectedCar) return;
  e.preventDefault();
  const touch = e.touches ? e.touches[0] : e;

  let newLeft = touch.clientX - offsetX - gameDiv.getBoundingClientRect().left;
  let newTop  = touch.clientY - offsetY - gameDiv.getBoundingClientRect().top;

  // 吸附到网格 + 只能沿方向移动
  const dir = selectedCar.dir;
  if (dir === 'h') {
    newTop = Math.round(newTop / GRID_SIZE) * GRID_SIZE;
    newLeft = Math.max(0, Math.min((COLS - selectedCar.length) * GRID_SIZE, newLeft));
  } else {
    newLeft = Math.round(newLeft / GRID_SIZE) * GRID_SIZE;
    newTop  = Math.max(0, Math.min((ROWS - selectedCar.length) * GRID_SIZE, newTop));
  }

  // 碰撞检测（简化版：不重叠其他车）
  if (!willCollide(newLeft, newTop)) {
    selectedCar.el.style.left = newLeft + 'px';
    selectedCar.el.style.top  = newTop + 'px';
  }
}

function willCollide(newLeft, newTop) {
  const w = parseInt(selectedCar.el.style.width);
  const h = parseInt(selectedCar.el.style.height);

  for (let other of cars) {
    if (other === selectedCar) continue;
    const ow = parseInt(other.el.style.width);
    const oh = parseInt(other.el.style.height);
    const ol = parseInt(other.el.style.left);
    const ot = parseInt(other.el.style.top);

    if (!(newLeft + w <= ol || newLeft >= ol + ow ||
          newTop  + h <= ot || newTop  >= ot + oh)) {
      return true; // 碰撞
    }
  }
  return false;
}

function endDrag() {
  document.removeEventListener('mousemove', onMove);
  document.removeEventListener('touchmove', onMove);
  document.removeEventListener('mouseup', endDrag);
  document.removeEventListener('touchend', endDrag);

  if (selectedCar && selectedCar.isPlayer) {
    const playerLeft = parseInt(selectedCar.el.style.left);
    // 假设出口在 col=5 右侧
    if (playerLeft >= (COLS - selectedCar.length) * GRID_SIZE) {
      msg.textContent = '通关成功！🚗💨';
      msg.style.opacity = '1';
      nextBtn.style.display = 'block';
    }
  }

  selectedCar = null;
}

// 下一关
nextBtn.addEventListener('click', () => {
  currentLevel++;
  initLevel(currentLevel);
});

// 启动第一关
initLevel(0);
</script>
</body>
</html>
