<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>粒子星空 · 鼠标引力场</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
    canvas {
      display: block;
    }
    #info {
      position: absolute;
      top: 20px;
      left: 20px;
      color: rgba(255,255,255,0.6);
      font-family: system-ui, sans-serif;
      font-size: 1rem;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>
<div id="info">移动鼠标 / 拖动手指 · 感受引力</div>

<script>
// ==================== 配置 ====================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let width, height;
function resize() {
  width = canvas.width = window.innerWidth;
  height = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// 鼠标/触摸位置
let mouse = { x: width/2, y: height/2, down: false };
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
});
window.addEventListener('touchmove', e => {
  if (e.touches.length > 0) {
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
  }
}, { passive: true });
window.addEventListener('touchstart', e => {
  if (e.touches.length > 0) {
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
    mouse.down = true;
  }
});
window.addEventListener('touchend', () => mouse.down = false);

// 粒子类
class Particle {
  constructor() {
    this.reset();
  }
  reset() {
    this.x = Math.random() * width;
    this.y = Math.random() * height;
    this.vx = (Math.random() - 0.5) * 0.8;
    this.vy = (Math.random() - 0.5) * 0.8;
    this.size = Math.random() * 2.2 + 0.6;
    this.hue = Math.random() * 60 + 180; // 青-蓝-紫范围
    this.alpha = Math.random() * 0.5 + 0.3;
    this.trail = [];
    this.trailLength = Math.floor(Math.random() * 8 + 4);
  }
  update() {
    // 引力/排斥
    const dx = mouse.x - this.x;
    const dy = mouse.y - this.y;
    const dist = Math.hypot(dx, dy) || 1; // 避免除0
    const force = mouse.down ? 120 : 60; // 按下更强排斥

    const power = force / (dist * dist);
    const ax = dx / dist * power * 0.8;
    const ay = dy / dist * power * 0.8;

    this.vx += ax;
    this.vy += ay;

    // 轻微阻力 + 边界反弹
    this.vx *= 0.98;
    this.vy *= 0.98;

    if (this.x < 0 || this.x > width)  this.vx *= -0.7;
    if (this.y < 0 || this.y > height) this.vy *= -0.7;

    this.x += this.vx;
    this.y += this.vy;

    // 记录轨迹
    this.trail.push({x: this.x, y: this.y});
    if (this.trail.length > this.trailLength) this.trail.shift();

    // 超出边界重置
    if (this.x < -50 || this.x > width+50 || this.y < -50 || this.y > height+50) {
      this.reset();
    }
  }
  draw() {
    // 尾迹
    ctx.beginPath();
    ctx.moveTo(this.trail[0]?.x || this.x, this.trail[0]?.y || this.y);
    for (let i = 1; i < this.trail.length; i++) {
      const p = this.trail[i];
      ctx.lineTo(p.x, p.y);
    }
    ctx.strokeStyle = `hsla(${this.hue}, 80%, 70%, ${this.alpha * 0.6})`;
    ctx.lineWidth = this.size * 0.6;
    ctx.stroke();

    // 粒子本体（发光点）
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${this.hue}, 100%, 80%, ${this.alpha})`;
    ctx.shadowBlur = 15;
    ctx.shadowColor = `hsl(${this.hue}, 100%, 70%)`;
    ctx.fill();
    ctx.shadowBlur = 0;
  }
}

// 创建粒子
const particles = [];
const particleCount = Math.min( Math.floor((width * height) / 12000), 350 ); // 密度自适应
for (let i = 0; i < particleCount; i++) {
  particles.push(new Particle());
}

// 动画循环
function animate() {
  ctx.fillStyle = 'rgba(0,0,0,0.06)'; // 拖尾效果
  ctx.fillRect(0, 0, width, height);

  particles.forEach(p => {
    p.update();
    p.draw();
  });

  requestAnimationFrame(animate);
}
animate();
</script>
</body>
</html>
